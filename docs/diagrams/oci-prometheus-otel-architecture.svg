<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="500" viewBox="0 0 1270 500" role="img" aria-labelledby="title desc"><title id="title">OCI and Multi-cloud Metrics Architecture</title><desc id="desc">OCI and Multi-cloud Metrics Architecture</desc><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><rect width="100%" height="100%" fill="#f8fafc"/><text x="40" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">OCI and Multi-cloud Metrics Architecture</text><g font-family="Arial, sans-serif"><rect x="45" y="115" width="215" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="152.5" y="142" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">OCI targets</text>
<text x="152.5" y="169" text-anchor="middle" font-size="14" fill="#475569">Linux node_exporter and</text>
<text x="152.5" y="187" text-anchor="middle" font-size="14" fill="#475569">Windows windows_exporter</text>
<rect x="45" y="300" width="215" height="120" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="152.5" y="327" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Other clouds</text>
<text x="152.5" y="354" text-anchor="middle" font-size="14" fill="#475569">AWS, Azure, GCP and on-</text>
<text x="152.5" y="372" text-anchor="middle" font-size="14" fill="#475569">prem exporters</text>
<rect x="350" y="205" width="230" height="126" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="465.0" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Prometheus proxy</text>
<text x="465.0" y="259" text-anchor="middle" font-size="14" fill="#475569">Scrapes exporters and</text>
<text x="465.0" y="277" text-anchor="middle" font-size="14" fill="#475569">exposes /federate</text>
<rect x="700" y="125" width="230" height="116" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="815.0" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">OCI Management Agent</text>
<text x="815.0" y="179" text-anchor="middle" font-size="14" fill="#475569">Reads /federate and pushes</text>
<text x="815.0" y="197" text-anchor="middle" font-size="14" fill="#475569">custom metrics</text>
<rect x="700" y="315" width="230" height="116" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="815.0" y="342" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">OTEL Collector</text>
<text x="815.0" y="369" text-anchor="middle" font-size="14" fill="#475569">Reads /federate and exports</text>
<text x="815.0" y="387" text-anchor="middle" font-size="14" fill="#475569">OTLP or remote_write</text>
<rect x="1030" y="125" width="200" height="116" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="1130.0" y="152" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">OCI Monitoring</text>
<text x="1130.0" y="179" text-anchor="middle" font-size="14" fill="#475569">MQL, alarms and custom</text>
<text x="1130.0" y="197" text-anchor="middle" font-size="14" fill="#475569">namespaces</text>
<rect x="1030" y="315" width="200" height="116" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
<text x="1130.0" y="342" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Grafana / backend</text>
<text x="1130.0" y="369" text-anchor="middle" font-size="14" fill="#475569">Prometheus, Datadog or</text>
<text x="1130.0" y="387" text-anchor="middle" font-size="14" fill="#475569">Grafana Cloud</text>
<line x1="260" y1="175" x2="350" y2="248" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="260" y1="360" x2="350" y2="286" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
