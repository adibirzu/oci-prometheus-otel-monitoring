<text x="980.0" y="175.0" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">outbound 443</text>
<line x1="930" y1="373" x2="1030" y2="373" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="980.0" y="365.0" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">remote_write</text></g></svg>
