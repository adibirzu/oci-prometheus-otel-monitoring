<svg xmlns="http://www.w3.org/2000/svg" width="1335" height="530" viewBox="0 0 1335 530" role="img" aria-labelledby="title desc"><title id="title">Deployment Validation Workflow</title><desc id="desc">Deployment Validation Workflow</desc><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><rect width="100%" height="100%" fill="#f8fafc"/><text x="40" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Deployment Validation Workflow</text><g font-family="Arial, sans-serif"><rect x="45" y="165" width="190" height="108" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="140.0" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Preflight</text>
<text x="140.0" y="219" text-anchor="middle" font-size="14" fill="#475569">Config, shell checks</text>
<text x="140.0" y="237" text-anchor="middle" font-size="14" fill="#475569">and no secrets in diff</text>
<rect x="305" y="165" width="200" height="108" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="405.0" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Destination stack</text>
<text x="405.0" y="219" text-anchor="middle" font-size="14" fill="#475569">OTEL, Prometheus</text>
<text x="405.0" y="237" text-anchor="middle" font-size="14" fill="#475569">remote_write and</text>
<text x="405.0" y="255" text-anchor="middle" font-size="14" fill="#475569">Grafana</text>
<rect x="575" y="165" width="200" height="108" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="675.0" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Source stack</text>
<text x="675.0" y="219" text-anchor="middle" font-size="14" fill="#475569">Exporter and Prometheus</text>
<text x="675.0" y="237" text-anchor="middle" font-size="14" fill="#475569">/federate</text>
<rect x="845" y="165" width="200" height="108" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
<text x="945.0" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Collector path</text>
<text x="945.0" y="219" text-anchor="middle" font-size="14" fill="#475569">Prometheus receiver to</text>
<text x="945.0" y="237" text-anchor="middle" font-size="14" fill="#475569">remote_write</text>
<rect x="1095" y="165" width="200" height="108" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="1195.0" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Verify metrics</text>
<text x="1195.0" y="219" text-anchor="middle" font-size="14" fill="#475569">node_load1,</text>
<text x="1195.0" y="237" text-anchor="middle" font-size="14" fill="#475569">otel_scope_name and</text>
<text x="1195.0" y="255" text-anchor="middle" font-size="14" fill="#475569">series count</text>
<rect x="430" y="360" width="230" height="108" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="545.0" y="387" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">OCI optional path</text>
<text x="545.0" y="414" text-anchor="middle" font-size="14" fill="#475569">Management Agent datasource</text>
<text x="545.0" y="432" text-anchor="middle" font-size="14" fill="#475569">to OCI Monitoring</text>
<rect x="755" y="360" width="230" height="108" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
<text x="870.0" y="387" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Cleanup</text>
<text x="870.0" y="414" text-anchor="middle" font-size="14" fill="#475569">Destroy containers and</text>
<text x="870.0" y="432" text-anchor="middle" font-size="14" fill="#475569">temporary cloud resources</text>
<line x1="235" y1="219" x2="305" y2="219" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="505" y1="219" x2="575" y2="219" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="775" y1="219" x2="845" y2="219" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="810.0" y="211.0" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">/federate</text>
<line x1="1045" y1="219" x2="1095" y2="219" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1070.0" y="211.0" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">query</text>
<line x1="675" y1="273" x2="545" y2="360" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="610.0" y="308.5" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">if OCI enabled</text>
<line x1="1195" y1="273" x2="870" y2="360" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="1032.5" y="308.5" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">after validation</text></g></svg>
